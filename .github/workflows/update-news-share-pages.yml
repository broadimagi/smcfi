name: Build Firebase public folder

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build-firebase-public:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Firebase public folder
        run: npm run build

      - name: Commit generated Firebase files
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No Firebase public file changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          git commit -m "Build Firebase public folder"
          git push
