name: Update news share pages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-news-share-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate news share pages
        run: node tools/generate-news-share-pages.mjs

      - name: Commit generated pages
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No news share page changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news
          git commit -m "Update generated news share pages"
          git push
