<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page Not Found | Simbayanan ni Maria Community Foundation, Inc.</title>
<meta name="robots" content="noindex">
<script>
  const path = window.location.pathname;
  const newsMatch = path.match(/^\/news\/([^/]+)\/?$/);
  const projectMatch = path.match(/^\/projects\/([^/]+)\/?$/);

  if (newsMatch) {
    window.location.replace(`/index.html#/news/${encodeURIComponent(newsMatch[1])}`);
  } else if (projectMatch) {
    window.location.replace(`/index.html#/projects/${encodeURIComponent(projectMatch[1])}`);
  }
</script>
</head>
<body>
<h1>Page not found</h1>
<p><a href="/index.html#/">Open the SMCFI website</a></p>
</body>
</html>
